name: Android Production Release

on:
  workflow_dispatch:
    inputs:
      wait_for_completion:
        description: "Wait for AAB build completion"
        required: true
        default: true
        type: boolean
      submit_to_play_internal:
        description: "Submit latest AAB to Google Play Internal testing"
        required: true
        default: false
        type: boolean

jobs:
  build-production-aab:
    name: Build Production AAB
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is missing. Add it in repo settings: Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Expo and EAS authentication
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build production AAB
        run: |
          if [ "${{ inputs.wait_for_completion }}" = "true" ]; then
            eas build --platform android --profile production --non-interactive --wait --json > eas-build-production.json
          else
            eas build --platform android --profile production --non-interactive --json > eas-build-production.json
          fi

          BUILD_ID="$(jq -r 'if type=="array" then .[0].id else .id end' eas-build-production.json)"
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "Unable to parse build id from EAS response."
            cat eas-build-production.json
            exit 1
          fi

          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"
          echo "Production build started: $BUILD_ID"

      - name: Resolve build artifact URL
        if: ${{ inputs.wait_for_completion }}
        run: |
          eas build:view "$BUILD_ID" --json > eas-build-production-view.json
          AAB_URL="$(jq -r '.artifacts.buildUrl // .artifacts.applicationArchiveUrl // empty' eas-build-production-view.json)"
          {
            echo "### Android Production AAB"
            echo ""
            echo "- Build ID: \`$BUILD_ID\`"
            if [ -n "$AAB_URL" ]; then
              echo "- AAB: $AAB_URL"
            else
              echo "- AAB URL not available yet (check Expo dashboard)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Submit latest production build to Play Internal testing
        if: ${{ inputs.submit_to_play_internal && inputs.wait_for_completion }}
        run: |
          eas submit --platform android --profile production --latest --non-interactive
          {
            echo ""
            echo "### Play Console Submit"
            echo "- Submitted latest Android production build to Internal testing."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Add non-wait summary
        if: ${{ !inputs.wait_for_completion }}
        run: |
          {
            echo "### Android Production Build Started"
            echo ""
            echo "- Build ID: \`$BUILD_ID\`"
            echo "- Check build status in Expo dashboard."
            if [ "${{ inputs.submit_to_play_internal }}" = "true" ]; then
              echo "- Submit step will run after this build job, but \`--latest\` expects a finished build."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
